name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend — lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api

  backend:
    name: Backend — install, import, boot smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Byte-compile all modules
        run: python -m compileall app
      - name: App imports cleanly
        run: python -c "from app.main import app"
      - name: Boot smoke test (lifespan + MongoDB index + /health)
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/health; then exit 0; fi
            sleep 1
          done
          echo "Backend never became healthy" && exit 1
        env:
          MONGODB_URL: mongodb://localhost:27017
