version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: mohiom-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: mohiom_db
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
    networks:
      - mohiom-network

volumes:
  mongodb_data:

networks:
  mohiom-network:
    driver: bridge

