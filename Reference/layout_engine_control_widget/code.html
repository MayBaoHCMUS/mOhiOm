<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Layout Engine Control</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary": "#006c49",
                      "error": "#ba1a1a",
                      "surface-variant": "#dce2f7",
                      "inverse-surface": "#293040",
                      "on-secondary": "#ffffff",
                      "primary-fixed-dim": "#adc6ff",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-container": "#00714d",
                      "inverse-primary": "#adc6ff",
                      "surface-container-highest": "#dce2f7",
                      "on-tertiary": "#ffffff",
                      "surface": "#f9f9ff",
                      "on-surface": "#141b2b",
                      "surface-container": "#e9edff",
                      "surface-container-low": "#f1f3ff",
                      "surface-container-high": "#e1e8fd",
                      "on-error": "#ffffff",
                      "primary": "#0058be",
                      "on-tertiary-container": "#fffbff",
                      "on-background": "#141b2b",
                      "tertiary-fixed-dim": "#ffb95f",
                      "surface-tint": "#005ac2",
                      "on-primary-container": "#fefcff",
                      "secondary-fixed": "#6ffbbe",
                      "error-container": "#ffdad6",
                      "primary-fixed": "#d8e2ff",
                      "on-tertiary-fixed": "#2a1700",
                      "inverse-on-surface": "#edf0ff",
                      "tertiary-fixed": "#ffddb8",
                      "on-primary": "#ffffff",
                      "tertiary": "#825100",
                      "secondary-container": "#6cf8bb",
                      "primary-container": "#2170e4",
                      "secondary-fixed-dim": "#4edea3",
                      "background": "#f9f9ff",
                      "on-surface-variant": "#424754",
                      "on-tertiary-fixed-variant": "#653e00",
                      "outline-variant": "#c2c6d6",
                      "outline": "#727785",
                      "on-primary-fixed-variant": "#004395",
                      "on-primary-fixed": "#001a42",
                      "on-error-container": "#93000a",
                      "surface-dim": "#d3daef",
                      "surface-bright": "#f9f9ff",
                      "on-secondary-fixed": "#002113",
                      "tertiary-container": "#a36700",
                      "on-secondary-fixed-variant": "#005236"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": [
                              "Plus Jakarta Sans"
                      ],
                      "body": [
                              "Plus Jakarta Sans"
                      ],
                      "label": [
                              "Plus Jakarta Sans"
                      ]
              }
      },
          },
        }
      </script>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-8">
<!-- Layout Engine Widget Card -->
<div class="bg-surface-container-lowest w-full max-w-sm rounded-xl p-6 shadow-[0_20px_40px_rgba(20,27,43,0.08)] flex flex-col gap-6">
<!-- Header -->
<div>
<h3 class="text-xl font-bold tracking-tight text-on-surface font-headline mb-1">Layout Engine</h3>
<p class="text-sm text-on-surface-variant">Configure panel dynamics and pacing</p>
</div>
<!-- Story Pacing Slider -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center">
<label class="text-sm font-semibold uppercase tracking-wider text-on-surface-variant font-label">Story Pacing</label>
<span class="text-sm font-medium text-primary">Medium</span>
</div>
<!-- Custom Slider Track -->
<div class="relative w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<!-- Gradient Fill -->
<div class="absolute top-0 left-0 h-full w-[45%] bg-gradient-to-r from-primary to-primary-container rounded-full"></div>
</div>
<!-- Custom Thumb (visually represented) -->
<div class="relative w-full h-0">
<div class="absolute top-[-10px] left-[45%] w-5 h-5 bg-surface-container-lowest rounded-full shadow-[0_4px_12px_rgba(20,27,43,0.15)] flex items-center justify-center -ml-2.5 cursor-pointer">
<div class="w-1.5 h-1.5 bg-primary rounded-full"></div>
</div>
</div>
<div class="flex justify-between text-xs text-on-surface-variant mt-2">
<span>Slow</span>
<span>Fast Action</span>
</div>
</div>
<!-- Grid Style Dropdown -->
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold uppercase tracking-wider text-on-surface-variant font-label">Grid Style</label>
<div class="relative">
<select class="appearance-none w-full bg-surface-container-low text-on-surface text-base font-medium rounded-lg px-4 py-3 border-none focus:ring-0 focus:bg-surface-container-lowest focus:shadow-[0_8px_24px_rgba(20,27,43,0.08)] transition-all cursor-pointer">
<option>Dynamic</option>
<option>Standard 4-panel</option>
<option>Webtoon vertical</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
</div>
<!-- Auto-position Toggle -->
<div class="flex items-center justify-between pt-2">
<div class="flex items-start gap-3">
<div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center text-primary shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">forum</span>
</div>
<div class="flex flex-col">
<span class="text-base font-medium text-on-surface">Auto-position Speech Bubbles</span>
<span class="text-sm text-on-surface-variant">(Face Detection)</span>
</div>
</div>
<!-- Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer shrink-0">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gradient-to-br peer-checked:from-primary peer-checked:to-primary-container shadow-inner"></div>
</label>
</div>
</div>
</body></html>
